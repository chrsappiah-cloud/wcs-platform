name: iOS CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-build-and-test:
    name: CI Build and Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build for simulator
        run: >
          xcodebuild
          -project "WCS-Platform/WCS-Platform.xcodeproj"
          -scheme "WCS-Platform"
          -destination "platform=iOS Simulator,name=iPhone 16"
          -sdk iphonesimulator
          -parallel-testing-enabled NO
          build

      - name: Run unit tests
        run: >
          xcodebuild
          -project "WCS-Platform/WCS-Platform.xcodeproj"
          -scheme "WCS-Platform"
          -destination "platform=iOS Simulator,name=iPhone 16"
          -sdk iphonesimulator
          -parallel-testing-enabled NO
          -only-testing:"WCS-PlatformTests"
          test

  cd-archive-artifact:
    name: CD Archive Artifact
    runs-on: macos-15
    needs: ci-build-and-test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Create unsigned archive
        run: >
          xcodebuild
          -project "WCS-Platform/WCS-Platform.xcodeproj"
          -scheme "WCS-Platform"
          -configuration Release
          -destination "generic/platform=iOS"
          -archivePath "$RUNNER_TEMP/WCS-Platform.xcarchive"
          CODE_SIGNING_ALLOWED=NO
          archive

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: wcs-platform-xcarchive
          path: ${{ runner.temp }}/WCS-Platform.xcarchive
          if-no-files-found: error
